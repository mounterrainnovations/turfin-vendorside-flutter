name: Build and Release Debug APK

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build and Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # If you are using a specific version, you can define it here:
          # flutter-version: '3.22.0'

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Generate release tag
        id: tag
        run: echo "release_tag=debug-$(date +'%Y%m%d%H%M%S')-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: Debug Build - ${{ steps.tag.outputs.release_tag }}
          files: build/app/outputs/flutter-apk/app-debug.apk
          prerelease: true
          generate_release_notes: false
          body: |
            Automatically generated debug build for commit ${{ github.sha }}.
